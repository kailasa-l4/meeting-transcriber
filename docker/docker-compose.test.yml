services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: goldleads
      POSTGRES_PASSWORD: goldleads_test
      POSTGRES_DB: goldleads_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goldleads"]
      interval: 2s
      timeout: 2s
      retries: 10
