services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: goldleads-db
    environment:
      POSTGRES_USER: goldleads
      POSTGRES_PASSWORD: goldleads_dev
      POSTGRES_DB: goldleads
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goldleads"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
