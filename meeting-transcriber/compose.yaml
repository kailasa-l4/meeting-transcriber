services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: meetings
      POSTGRES_USER: meetings
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meetings}
    volumes:
      - meeting_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "meetings" ]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  transcriber:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      - PORT=${PORT:-8000}
      - DATABASE_URL=postgresql+asyncpg://meetings:${POSTGRES_PASSWORD:-meetings}@db:5432/meetings
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    restart: unless-stopped

volumes:
  meeting_db_data:
