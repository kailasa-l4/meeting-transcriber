name: Nightly Agent Evals

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  agent-evals:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: goldleads
          POSTGRES_PASSWORD: goldleads_test
          POSTGRES_DB: goldleads_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://goldleads:goldleads_test@localhost:5433/goldleads_test
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: cd backend && uv sync --all-extras
      - name: Run agent evals
        run: cd backend && uv run pytest tests/evals/ -v --timeout=300
